{% extends "base.html" %}
{% block body %}
<div class="card">
  <h2>{{ 'Edit' if item else 'Add' }} Laptop</h2>

  <form method="post" novalidate>
    <div class="form-grid">
      <label for="sku">SKU</label>
      <input id="sku" name="sku" type="text" value="{{ item.sku if item else '' }}" required>

      <label for="brand">Brand</label>
      <input id="brand" name="brand" type="text" value="{{ item.brand if item else '' }}">

      <label for="model">Model</label>
      <input id="model" name="model" type="text" value="{{ item.model if item else '' }}">

      <label for="serial">Serial</label>
      <input id="serial" name="serial" type="text" value="{{ item.serial if item else '' }}">

      <label for="cpu">CPU</label>
      <input id="cpu" name="cpu" type="text" value="{{ item.cpu if item else '' }}">

      <label for="ram_gb">RAM (GB)</label>
      <input id="ram_gb" name="ram_gb" type="number" value="{{ item.ram_gb if item else '' }}">

      <label for="storage">Storage</label>
      <input id="storage" name="storage" type="text" value="{{ item.storage if item else '' }}">

      <label for="initial_price">Initial price</label>
      <input id="initial_price" name="initial_price" type="number" step="0.01" value="{{ item.initial_price if item else '' }}">

      <label for="selling_price">Selling price</label>
      <input id="selling_price" name="selling_price" type="number" step="0.01" value="{{ item.selling_price if item else '' }}">

      <label for="location">Location</label>
      <input id="location" name="location" type="text" value="{{ item.location if item else '' }}">

      <label for="status">Status</label>
      <select id="status" name="status">
        <option value="in_stock" {% if item and item.status=='in_stock' %}selected{% endif %}>In stock</option>
        <option value="sold" {% if item and item.status=='sold' %}selected{% endif %}>Sold</option>
        <option value="reserved" {% if item and item.status=='reserved' %}selected{% endif %}>Reserved</option>
        <option value="out_for_repair" {% if item and item.status=='out_for_repair' %}selected{% endif %}>Out for repair</option>
      </select>

      <label for="notes">Notes</label>
      <textarea id="notes" name="notes">{{ item.notes if item else '' }}</textarea>
    </div>

    <div class="form-actions">
      <button class="btn" type="submit">Save</button>
      <a class="btn secondary" href="{{ url_for('index') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
